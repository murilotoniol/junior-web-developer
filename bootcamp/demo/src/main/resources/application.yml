spring:
 datasource:
  url: jdbc:postgresql://localhost:5432/bootcamp
  username: postgres
  password: postgres
  driver-class-name: org.postgresql.Driver

 jpa:
  show-sql: true
  hibernate:
   ddl-auto: update
  properties:
   hibernate:
    dialect: org.hibernate.dialect.PostgreSQLDialect
    format_sql: true

logging:
 level:
  org.hibernate.SQL: DEBUG
  org.hibernate.tool.schema: DEBUG